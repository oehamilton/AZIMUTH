<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AZIMUTH</title>
  <style>
    :root {
      --bg-app: #1a1a1a;
      --bg-sidebar: #252220;
      --bg-card: #2e2a26;
      --border: #3a3632;
      --text: #e8e0d5;
      --text-muted: #9a8f82;
      --accent: #c4a574;
      --accent-dim: #8b7355;
      --color-home: #4ade80;
      --color-target: #60a5fa;
      --danger-bg: #5c3a38;
      --danger-border: #7a4a45;
      --danger-text: #e8c0b8;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg-app); color: var(--text); font-size: 14px; line-height: 1.45; }
    #app { display: flex; height: 100vh; min-width: 640px; }
    #sidebar { width: 300px; min-width: 280px; padding: 1rem; background: var(--bg-sidebar); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; gap: 1.25rem; }
    #sidebar h2 { margin: 0 0 0.5rem 0; font-size: 0.875rem; font-weight: 600; color: var(--accent); letter-spacing: 0.02em; }
    form.side-form { display: flex; flex-direction: column; gap: 0.5rem; }
    form.side-form input { padding: 0.5rem 0.6rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.9rem; }
    form.side-form input::placeholder { color: var(--text-muted); }
    form.side-form button { padding: 0.55rem; background: var(--accent); color: var(--bg-app); border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    form.side-form button:hover { filter: brightness(1.08); }
    .btn-danger { padding: 0.45rem; background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-border); border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .btn-danger:hover { background: #6d4542; }
    .dropdown-label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .sidebar-select { width: 100%; padding: 0.5rem 0.6rem; background: var(--bg-card); color: var(--text); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.5rem; font-size: 0.9rem; }
    #results { background: var(--bg-card); padding: 1rem; border-radius: 8px; font-size: 0.9rem; border: 1px solid var(--border); }
    #results .unit-select { margin-bottom: 0.75rem; font-size: 0.85rem; color: var(--text-muted); }
    #results .unit-select select { background: var(--bg-app); color: var(--text); border: 1px solid var(--border); padding: 0.35rem 0.5rem; border-radius: 4px; margin-left: 0.25rem; }
    #results .path-block { margin-bottom: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
    #results .path-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    #results .path-label { font-weight: 600; color: var(--accent); margin-bottom: 0.2rem; }
    #results .path-detail { color: var(--text); font-size: 0.85rem; }
    #results .path-detail .magnetic { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.15rem; }
    .sidebar-error { font-size: 0.8rem; color: var(--danger-text); margin-top: 0.35rem; padding: 0.35rem; background: rgba(92,58,56,0.3); border-radius: 4px; display: none; }
    .sidebar-error.visible { display: block; }
    .sidebar-hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
    #map-container { flex: 1; position: relative; cursor: crosshair; min-width: 320px; }
    #map { width: 100%; height: 100%; background: #0f0e0d; display: block; }
    #map-legend { position: absolute; bottom: 0.75rem; left: 0.75rem; z-index: 10; pointer-events: none; background: rgba(37,34,32,0.92); color: var(--text); font-size: 0.75rem; padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid var(--border); }
    .map-controls { position: absolute; top: 0.75rem; left: 0.75rem; display: flex; gap: 0.35rem; z-index: 10; pointer-events: auto; }
    .map-controls button { padding: 0.4rem 0.6rem; background: rgba(37,34,32,0.92); color: var(--text); border: 1px solid var(--border); border-radius: 6px; font-size: 0.75rem; cursor: pointer; }
    .map-controls button:hover { background: var(--bg-card); }
    .map-controls button.active { background: var(--accent); color: var(--bg-app); border-color: var(--accent); }
    #map-legend span { margin-right: 0.75rem; white-space: nowrap; }
    #map-legend .leg-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.25rem; vertical-align: middle; }
    #map-legend .leg-dot.home { background: var(--color-home); }
    #map-legend .leg-dot.target { background: var(--color-target); }
    .home-marker { fill: var(--color-home); stroke: #1a1a1a; stroke-width: 2; }
    .target-marker { fill: var(--color-target); stroke: #1a1a1a; stroke-width: 2; }
    .path-short { fill: none; stroke: var(--accent); stroke-width: 1.5; opacity: 0.9; }
    .path-long { fill: none; stroke: var(--accent-dim); stroke-width: 1; stroke-dasharray: 4,2; opacity: 0.8; }
    .map-cities .city-dot { fill: var(--text-muted); stroke: none; }
    .map-cities .city-label { fill: var(--text-muted); font-family: system-ui, sans-serif; dominant-baseline: middle; }
  </style>
</head>
<body>
  <div id="load-status" style="position:fixed;top:0;left:0;right:0;padding:0.5rem;background:#252220;color:#c4a574;font-size:0.9rem;z-index:9999;">Loading…</div>
  <div id="app">
    <aside id="sidebar">
      <section>
        <h2>Homes</h2>
        <label class="dropdown-label">Current home</label>
        <select id="home-select" class="sidebar-select" aria-label="Select saved home"></select>
        <form id="add-home" class="side-form" style="margin-top: 0.5rem;">
          <input type="text" id="home-name" placeholder="Name" required />
          <input type="number" id="home-lat" placeholder="Lat (decimal)" step="any" required />
          <input type="number" id="home-lon" placeholder="Lon (decimal)" step="any" required />
          <input type="number" id="home-decl" placeholder="Mag decl (°)" step="any" />
          <button type="submit" id="home-submit-btn">Add home</button>
        </form>
        <button type="button" id="delete-home-btn" class="btn-danger" style="margin-top: 0.25rem; display: none;">Delete home</button>
      </section>
      <section>
        <h2>Targets</h2>
        <label class="dropdown-label">Current target</label>
        <select id="target-select" class="sidebar-select" aria-label="Select saved target"></select>
        <form id="set-target" class="side-form" style="margin-top: 0.5rem;">
          <input type="text" id="target-name" placeholder="Target name (optional)" />
          <input type="number" id="target-lat" placeholder="Lat (decimal)" step="any" />
          <input type="number" id="target-lon" placeholder="Lon (decimal)" step="any" />
          <button type="submit" id="target-submit-btn">Set target</button>
        </form>
        <button type="button" id="save-target-btn" style="margin-top: 0.25rem; padding: 0.45rem; background: var(--border); color: var(--text); border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; display: none;">Save as target</button>
        <button type="button" id="delete-target-btn" class="btn-danger" style="margin-top: 0.25rem; display: none;">Delete target</button>
        <p class="sidebar-hint" id="target-hint">Or click on the map to set target.</p>
        <div id="sidebar-error" class="sidebar-error" role="alert"></div>
      </section>
      <section id="results">
        <div class="unit-select">Distance: <select id="distance-unit"><option value="km">km</option><option value="nm">nm</option><option value="miles">miles</option></select></div>
        <div id="results-content">Set a home and target to see paths.</div>
      </section>
    </aside>
    <div id="map-container">
      <svg id="map"></svg>
      <div id="map-zoom-controls" class="map-controls" aria-label="Map zoom">
        <button type="button" id="zoom-fit-path" title="Zoom in to fit home and target">Fit path</button>
        <button type="button" id="zoom-full" title="Zoom out to full world view">Full map</button>
      </div>
      <div id="map-legend" aria-hidden="true">
        <span><span class="leg-dot home"></span> Home</span>
        <span><span class="leg-dot target"></span> Target</span>
        <span>— Short path</span>
        <span>- - Long path</span>
      </div>
    </div>
  </div>
  <script src="map.js"></script>
</body>
</html>
