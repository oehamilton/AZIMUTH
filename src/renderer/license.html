<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>License — AZIMUTH</title>
  <style>
    :root {
      --bg-sidebar: #252220;
      --bg-card: #2e2a26;
      --border: #3a3632;
      --text: #e8e0d5;
      --text-muted: #9a8f82;
      --accent: #c4a574;
      --danger-text: #e8c0b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-sidebar);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      padding: 1.5rem 2rem;
      max-width: 420px;
    }
    h1 { margin: 0 0 1rem 0; font-size: 1.25rem; color: var(--accent); }
    .block { margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem; }
    input[type="text"] {
      width: 100%;
      padding: 0.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: ui-monospace, monospace;
    }
    button {
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: #1a1a1a;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    button:hover { filter: brightness(1.08); }
    #status { margin-top: 0.75rem; font-size: 0.85rem; min-height: 1.25rem; }
    #status.valid { color: var(--accent); }
    #status.invalid { color: var(--danger-text); }
    #status.empty { color: var(--text-muted); }
    .hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 1rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>License</h1>
  <div class="block">
    <label for="license-key">License key</label>
    <input type="text" id="license-key" placeholder="Enter key (e.g. XXXXX-XXXXX-XXXXX)" autocomplete="off" />
    <button type="button" id="save-license-btn">Save & validate</button>
    <p id="status" class="empty" aria-live="polite"></p>
  </div>
  <p class="hint">For commercial licensing, contact <a href="mailto:support@project8x.com">support@project8x.com</a>.</p>
  <script>
    (function () {
      if (!window.azimuth) return;
      var keyInput = document.getElementById("license-key");
      var saveBtn = document.getElementById("save-license-btn");
      var statusEl = document.getElementById("status");

      function setStatus(msg, className) {
        statusEl.textContent = msg;
        statusEl.className = className || "empty";
      }

      function validateKey(key) {
        if (!key || typeof key !== "string") return { valid: false };
        var trimmed = key.trim();
        if (trimmed.length < 10) return { valid: false };
        var format = /^[A-Za-z0-9-]+$/;
        if (!format.test(trimmed)) return { valid: false };
        return { valid: true, key: trimmed };
      }

      function refresh() {
        window.azimuth.loadData().then(function (data) {
          var prefs = data.preferences || {};
          var key = prefs.licenseKey || "";
          var valid = prefs.licenseValid === true;
          keyInput.value = "";
          keyInput.placeholder = key ? "Key saved. Enter new key to replace." : "Enter key (e.g. XXXXX-XXXXX-XXXXX)";
          if (valid) setStatus("Licensed.", "valid");
          else if (key) setStatus("Key saved. Invalid or expired.", "invalid");
          else setStatus("", "empty");
        }).catch(function () { setStatus("Could not load data.", "invalid"); });
      }

      saveBtn.addEventListener("click", function () {
        var raw = keyInput.value.trim();
        var result = validateKey(raw);
        if (!result.valid) {
          setStatus("Invalid key format. Use letters, numbers, and hyphens (min 10 characters).", "invalid");
          return;
        }
        window.azimuth.loadData().then(function (data) {
          if (!data.preferences) data.preferences = {};
          data.preferences.licenseKey = result.key;
          data.preferences.licenseValid = true;
          return window.azimuth.saveData(data);
        }).then(function () {
          keyInput.value = "";
          keyInput.placeholder = "Key saved. Enter new key to replace.";
          setStatus("Licensed.", "valid");
        }).catch(function () {
          setStatus("Could not save.", "invalid");
        });
      });

      refresh();
    })();
  </script>
</body>
</html>
